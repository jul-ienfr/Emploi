<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi — Carte des offres</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #f5f5f5; --card-bg: white; --text: #333; --text-muted: #666;
            --border: #ddd; --primary: #1a1a2e; --primary-hover: #16213e;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --text-muted: #999;
                --border: #333; --primary: #e0e0e0;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: var(--primary); color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; }
        .header a { color: white; text-decoration: none; opacity: 0.7; font-size: 0.9rem; }
        .header a:hover { opacity: 1; }
        #map { height: calc(100vh - 72px); width: 100%; }
        .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .popup-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; }
        .popup-company { color: #666; font-size: 0.85rem; }
        .popup-score { display: inline-block; background: #1a1a2e; color: white; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.8rem; margin-top: 0.3rem; }
        .popup-link { display: inline-block; margin-top: 0.4rem; color: #1a1a2e; text-decoration: none; font-size: 0.85rem; }
        .popup-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Carte des offres</h1>
        <a href="/">Retour aux offres</a>
    </div>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([46.8, 2.3], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 18,
        }).addTo(map);

        fetch('/api/map-data')
            .then(function(r) { return r.json(); })
            .then(function(offers) {
                if (!offers.length) return;
                var bounds = [];
                offers.forEach(function(o) {
                    if (!o.location) return;
                    // Use geocoding fallback: just display as list if no coords
                    // For real use, you'd geocode locations server-side
                    var popup = '<div class="popup-title">' + o.title + '</div>'
                        + '<div class="popup-company">' + o.company + ' — ' + o.location + '</div>'
                        + '<div class="popup-score">Score: ' + o.score + '</div>';
                    if (o.url) {
                        popup += '<br><a class="popup-link" href="' + o.url + '" target="_blank">Voir l\'offre</a>';
                    }
                    popup += '<br><a class="popup-link" href="/offer/' + o.id + '">Détails</a>';
                    // Default approximate center for France; real geocoding would replace this
                    var lat = 46.8 + (Math.random() - 0.5) * 6;
                    var lng = 2.3 + (Math.random() - 0.5) * 8;
                    var marker = L.marker([lat, lng]).addTo(map).bindPopup(popup);
                    bounds.push([lat, lng]);
                });
                if (bounds.length) {
                    map.fitBounds(bounds, { padding: [30, 30] });
                }
            });
    </script>
</body>
</html>
