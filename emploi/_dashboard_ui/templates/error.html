<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi — Erreur {{ code }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error { text-align: center; }
        .error h1 { font-size: 4rem; color: #e74c3c; }
        .error p { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .error a { color: #1a1a2e; text-decoration: none; margin-top: 2rem; display: inline-block; padding: 0.5rem 1.5rem; background: #1a1a2e; color: white; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="error">
        <h1>{{ code }}</h1>
        <p>{{ message }}</p>
        <a href="/">Retour au dashboard</a>
    </div>
</body>
</html>
